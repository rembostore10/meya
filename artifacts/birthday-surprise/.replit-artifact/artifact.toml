kind = "web"
previewPath = "/"
title = "Selamat Ulang Tahun"
version = "1.0.0"
id = "artifacts/birthday-surprise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25201

[services.development]
run = "pnpm --filter @workspace/birthday-surprise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday-surprise", "run", "build" ]
publicDir = "artifacts/birthday-surprise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25201"
BASE_PATH = "/"
