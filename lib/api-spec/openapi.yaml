openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prayers
    description: Prayer/wish messages
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /prayers:
    post:
      operationId: sendPrayer
      tags: [prayers]
      summary: Send a prayer/wish
      description: Forwards the prayer/wish to the configured Telegram chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Prayer"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrayerResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Prayer:
      type: object
      properties:
        prayer:
          type: string
          minLength: 1
          maxLength: 2000
        from:
          type: string
          maxLength: 200
      required:
        - prayer
    PrayerResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

